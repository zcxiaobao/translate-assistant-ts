<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职能沟通翻译助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                         'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .direction-selector {
            margin-bottom: 30px;
        }

        .direction-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .direction-select:hover {
            border-color: #667eea;
        }

        .direction-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .char-count {
            text-align: right;
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }

        .translate-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .translate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .translate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
            color: #333;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #667eea;
            font-weight: 500;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border-color: #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .success-badge {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 职能沟通翻译助手</h1>
        <p class="subtitle">帮助产品经理和开发工程师更好地理解彼此</p>

        <!-- 翻译方向选择 -->
        <div class="direction-selector">
            <label for="direction">翻译方向</label>
            <select id="direction" class="direction-select">
                <option value="pm-to-dev" selected>产品 → 开发：将产品需求翻译为技术实现方案</option>
                <option value="dev-to-pm">开发 → 产品：将技术方案翻译为业务价值</option>
                <option value="pm-to-operation">产品 → 运营：将产品需求翻译为运营策略</option>
                <option value="dev-to-operation">开发 → 运营：将技术方案翻译为数据和功能说明</option>
                <option value="operation-to-pm">运营 → 产品：将运营需求翻译为产品功能</option>
                <option value="operation-to-dev">运营 → 开发：将运营需求翻译为技术需求</option>
            </select>
        </div>

        <!-- 内容输入区域 -->
        <div class="input-section">
            <label for="content">输入内容</label>
            <textarea
                id="content"
                placeholder="请输入需要翻译的内容..."
                maxlength="2000"
            ></textarea>
            <div class="char-count" id="charCount">0 / 2000</div>
        </div>

        <!-- 翻译按钮 -->
        <button class="translate-btn" id="translateBtn">开始翻译</button>

        <!-- 结果展示区域 -->
        <div class="result-section" id="resultSection">
            <label>翻译结果</label>
            <div class="result-box" id="resultBox"></div>
        </div>
    </div>

    <script>
        // DOM 元素
        const directionSelect = document.getElementById('direction');
        const contentTextarea = document.getElementById('content');
        const charCount = document.getElementById('charCount');
        const translateBtn = document.getElementById('translateBtn');
        const resultSection = document.getElementById('resultSection');
        const resultBox = document.getElementById('resultBox');

        // 输入内容变化事件 - 更新字符计数
        contentTextarea.addEventListener('input', () => {
            const length = contentTextarea.value.length;
            charCount.textContent = `${length} / 2000`;

            if (length > 2000) {
                charCount.style.color = '#c33';
            } else {
                charCount.style.color = '#999';
            }
        });

        // 翻译按钮点击事件
        translateBtn.addEventListener('click', async () => {
            const content = contentTextarea.value.trim();
            const currentDirection = directionSelect.value;

            // 输入验证：空内容
            if (!content) {
                showError('请输入需要翻译的内容');
                return;
            }

            // 输入验证：内容过长
            if (content.length > 2000) {
                showError('内容过长，请精简后重试');
                return;
            }

            // 禁用翻译按钮
            translateBtn.disabled = true;
            translateBtn.textContent = '翻译中...';

            // 显示结果区域和加载状态
            resultSection.classList.add('show');
            resultBox.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>正在翻译...</span></div>';

            try {
                // 使用 EventSource 连接 SSE 端点
                await streamTranslation(currentDirection, content);
            } catch (error) {
                showError(error.message || '翻译失败，请稍后重试');
            } finally {
                // 重新启用翻译按钮
                translateBtn.disabled = false;
                translateBtn.textContent = '开始翻译';
            }
        });

        /**
         * 流式翻译 - 使用 EventSource
         */
        async function streamTranslation(direction, content) {
            return new Promise((resolve, reject) => {
                // 使用 fetch 发起请求
                fetch('/api/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ direction, content }),
                })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(data => {
                            throw new Error(data.error || '请求失败');
                        });
                    }

                    // 清空结果区域
                    resultBox.innerHTML = '<div class="success-badge">✓ 翻译完成</div>';

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    function readStream() {
                        reader.read().then(({ done, value }) => {
                            if (done) {
                                resolve();
                                return;
                            }

                            // 解码数据
                            const text = decoder.decode(value, { stream: true });
                            const lines = text.split('\n');

                            lines.forEach(line => {
                                if (line.startsWith('data: ')) {
                                    const data = JSON.parse(line.slice(6));

                                    if (data.content) {
                                        // 追加内容到结果区域
                                        const lastChild = resultBox.lastChild;
                                        if (lastChild && lastChild.nodeType === Node.TEXT_NODE) {
                                            lastChild.textContent += data.content;
                                        } else {
                                            resultBox.appendChild(document.createTextNode(data.content));
                                        }
                                    } else if (data.error) {
                                        showError(data.error);
                                        reject(new Error(data.error));
                                    } else if (data.done) {
                                        resolve();
                                    }
                                }
                            });

                            readStream();
                        }).catch(reject);
                    }

                    readStream();
                })
                .catch(error => {
                    if (error.message.includes('Failed to fetch')) {
                        reject(new Error('网络连接失败，请检查网络设置'));
                    } else {
                        reject(error);
                    }
                });
            });
        }

        /**
         * 显示错误信息
         */
        function showError(message) {
            resultSection.classList.add('show');
            resultBox.innerHTML = `<div class="error">❌ ${message}</div>`;
        }
    </script>
</body>
</html>
